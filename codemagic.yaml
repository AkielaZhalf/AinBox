workflows:
  ios-build:
    name: Build IPA (AiNbox iOS 12)
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    environment:
      node: 20
      xcode: 16.0
      vars:
        # Pindahkan pengaturan kedalaman klon ke sini (sebagai variabel lingkungan)
        CM_CLONE_DEPTH: 1 
    scripts:
      - name: Install dependencies
        script: |
          npm install
          
      - name: Build web assets
        script: |
          npm run build
          
      - name: Add Capacitor iOS
        script: |
          npx cap add ios || true
          npx cap sync ios
          
      - name: Patch Podfile - set iOS 12
        script: |
          cd ios/App
          # Mengubah platform iOS bawaan menjadi 12.0
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '12.0'/g" Podfile
          
          # Menyisipkan skrip pemaksa Swift Compiler agar mengabaikan error ketidakcocokan versi iOS lama
          cat << 'EOF' >> Podfile

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '12.0'
                config.build_settings['SWIFT_VERSION'] = '5.0'
                config.build_settings['APPLICATION_EXTENSION_API_ONLY'] = 'NO'
                config.build_settings['BUILD_LIBRARY_FOR_DISTRIBUTION'] = 'NO'
              end
            end
          end
          EOF
          
          echo "=== Hasil Patch Podfile ==="
          cat Podfile
          
      - name: Set iOS 12 all xcconfig
        script: |
          find ios -name "*.xcconfig" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' {} \; || true
          
      - name: Pod install
        script: |
          cd ios/App
          pod install --repo-update
          
      - name: Build IPA (unsigned, iOS 12, for sideload)
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=YES \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            EXCLUDED_ARCHS="armv7 armv7s" \
            build
            
      - name: Package .ipa
        script: |
          cd ios/App
          APP_PATH=$(find build -name "*.app" | head -1)
          echo "Found .app: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r AiNbox.ipa Payload
          echo "✅ IPA iOS 12 siap!"
          ls -lh AiNbox.ipa
          
    artifacts:
      - ios/App/AiNbox.ipa
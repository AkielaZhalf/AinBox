workflows:
  ios-build:
    name: Build IPA (AiNbox iOS 12)
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    environment:
      node: 20
      xcode: 16.0
      vars:
        CM_CLONE_DEPTH: 1 
    scripts:
      - name: Install dependencies
        script: |
          npm install
          
      - name: Build web assets
        script: |
          npm run build
          
      - name: Clean and Add Capacitor iOS 3
        script: |
          # Hapus sisa folder ios lama jika ada agar tidak bentrok antar versi
          rm -rf ios/App
          npx cap add ios
          npx cap sync ios
          
      - name: Patch Podfile - set iOS 12
        script: |
          cd ios/App
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '12.0'/g" Podfile
          
      - name: Pod install
        script: |
          cd ios/App
          pod install --repo-update
          
      # 1. Kita kembalikan izin compile dasar Xcode agar membuat struktur penampung tanda tangan
      # 1. Biarkan Xcode 16 build total tanpa menyentuh fitur Code Sign (Lolos dari blokir SDK 18)
      - name: Build App (iOS 12, unsigned)
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=YES \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            EXCLUDED_ARCHS="armv7 armv7s" \
            build

      # 2. Inject Entitlements & Paksa Ad-Hoc Sign lewat tool macOS (Filza/AppSync bypass)
      - name: Package and Force Sign .ipa
        script: |
          cd ios/App
          APP_PATH=$(find build -name "*.app" | head -1)
          echo "Menemukan aplikasi di: $APP_PATH"
          
          # Membuat file entitlements dummy agar iOS 12 mengenali application-identifier
          cat << 'EOF' > entitlements.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>application-identifier</key>
              <string>com.ainbox.app</string>
              <key>get-task-allow</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          echo "=== Melakukan Ad-Hoc Signing Manual ==="
          # Tanda tangani framework internal Capacitor terlebih dahulu
          find "$APP_PATH" -name "*.framework" -exec codesign --force --sign "-" --entitlements entitlements.plist {} \; || true
          
          # Tanda tangani biner aplikasi utama
          codesign --force --sign "-" --entitlements entitlements.plist "$APP_PATH"
          
          # Verifikasi hasil tanda tangan
          codesign -dvvv "$APP_PATH"
          
          # Bungkus ke format .ipa
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r AiNbox.ipa Payload
          echo "✅ IPA iOS 12 Signed Berhasil Dibuat!"
          ls -lh AiNbox.ipa
          
    artifacts:
      - ios/App/AiNbox.ipa
workflows:
  ios-build:
    name: Build IPA (AiNbox iOS 12)
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    environment:
      node: 20
      xcode: 16.0
      vars:
        # Pindahkan pengaturan kedalaman klon ke sini (sebagai variabel lingkungan)
        CM_CLONE_DEPTH: 1 
    scripts:
      - name: Install dependencies
        script: |
          npm install
          
      - name: Build web assets
        script: |
          npm run build
          
      - name: Add Capacitor iOS
        script: |
          npx cap add ios || true
          npx cap sync ios
          
      - name: Reset and Patch Project to iOS 12 (Safe Method)
        script: |
          cd ios/App
          # Kembalikan file ke kondisi awal agar tidak ada sisa patch rusak sebelumnya
          git checkout Podfile || true
          git checkout App.xcodeproj/project.pbxproj || true
          
          # 1. Set platform utama di Podfile ke iOS 12
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '12.0'/g" Podfile
          
          # 2. Paksa ubah target semua file xcconfig ke iOS 12
          cd ../..
          find ios -name "*.xcconfig" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' {} \; || true
          
          # 3. TRICK UTAMA: Paksa ubah versi Swift dan Target langsung di skrip proyek Xcode utama (.pbxproj)
          # Ini akan menimpa setelan apa pun yang dikunci oleh Capacitor atau Pods
          find ios -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' {} \; || true
          find ios -name "project.pbxproj" -exec sed -i '' 's/SWIFT_VERSION = [0-9.]*/SWIFT_VERSION = 5.0/g' {} \; || true
          
          echo "=== Verifikasi Pengaturan Target Proyek ==="
          grep -E "IPHONEOS_DEPLOYMENT_TARGET|SWIFT_VERSION" ios/App/App.xcodeproj/project.pbxproj | head -n 10
          
      - name: Pod install
        script: |
          cd ios/App
          pod install --repo-update
          
      - name: Build IPA (unsigned, iOS 12, for sideload)
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=YES \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            EXCLUDED_ARCHS="armv7 armv7s" \
            build
            
      - name: Package .ipa
        script: |
          cd ios/App
          APP_PATH=$(find build -name "*.app" | head -1)
          echo "Found .app: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r AiNbox.ipa Payload
          echo "✅ IPA iOS 12 siap!"
          ls -lh AiNbox.ipa
          
    artifacts:
      - ios/App/AiNbox.ipa
workflows:
  ios-build:
    name: Build IPA (AiNbox iOS 12)
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    environment:
      node: 20
      xcode: 16.0
      vars:
        CM_CLONE_DEPTH: 1 
    scripts:
      - name: Install dependencies
        script: |
          npm install
          
      - name: Build web assets
        script: |
          npm run build
          
      - name: Clean and Add Capacitor iOS 3
        script: |
          # Hapus sisa folder ios lama jika ada agar tidak bentrok antar versi
          rm -rf ios/App
          npx cap add ios
          npx cap sync ios
          
      - name: Patch Podfile - set iOS 12
        script: |
          cd ios/App
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '12.0'/g" Podfile
          
      - name: Pod install
        script: |
          cd ios/App
          pod install --repo-update
          
      # 1. Kita kembalikan izin compile dasar Xcode agar membuat struktur penampung tanda tangan
      - name: Build App (iOS 12, ready for Ad-Hoc signing)
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=YES \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            EXCLUDED_ARCHS="armv7 armv7s" \
            build

      # 2. Langkah krusial: Memaksa macOS memberikan identitas Ad-Hoc pada biner aplikasi
      - name: Package and Ad-Hoc Sign .ipa
        script: |
          cd ios/App
          APP_PATH=$(find build -name "*.app" | head -1)
          echo "Menemukan aplikasi di: $APP_PATH"
          
          # Lakukan tanda tangan Ad-Hoc secara paksa menggunakan signature "-"
          echo "=== Memulai Proses Ad-Hoc Signing ==="
          codesign --force --deep --sign "-" "$APP_PATH"
          
          # Verifikasi apakah tanda tangan buatan berhasil terpasang
          codesign -dvvv "$APP_PATH"
          
          # Bungkus menjadi file .ipa siap pakai
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r AiNbox.ipa Payload
          echo "✅ IPA iOS 12 dengan Tanda Tangan Ad-Hoc SIAP!"
          ls -lh AiNbox.ipa
          
    artifacts:
      - ios/App/AiNbox.ipa
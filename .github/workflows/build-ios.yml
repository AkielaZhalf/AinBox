name: Build IPA (AiNbox iOS 12)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-13

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Use Xcode 15
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add Capacitor iOS
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: Patch Podfile - set iOS 12
        run: |
          cd ios/App
          sed -i '' "s/platform :ios, '[0-9.]*/platform :ios, '12.0'/" Podfile
          grep -q "platform :ios" Podfile || sed -1 '' '1s/^/platform :ios,'\''12.0'\''\n/' Podfile
          head -10 Podfile

      - name: Set iOS 12 all xcconfig - set iOS 12
        run: |
          find ios -name "*.xcconfig" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' {} \; || true

      - name: Pod install
        run: |
          cd ios/App
          pod install --repo-update

      - name: Build IPA (unsigned, iOS 12, for sideload)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            build

      - name: Package .ipa
        run: |
          cd ios/App
          APP_PATH=$(find build -name "*.app" | head -1)
          echo "Found .app: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r AiNbox.ipa Payload
          echo "✅ IPA iOS 12 siap!"
          ls -lh AiNbox.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiNbox-IPA-iOS12
          path: ios/App/AiNbox.ipa
          retention-days: 30
